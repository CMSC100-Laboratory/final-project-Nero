name: Lint and Type Check
on:
  pull_request:
    branches: [main]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Lint backend
        working-directory: backend
        run: |
          npm ci
          npx eslint ./src
          npx tsc --noEmit
      - name: Lint frontend
        working-directory: frontend
        run: |
          npm ci
          npx eslint ./src
          npx tsc --noEmit
